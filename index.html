  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --negro: #080808; --verde: #b8f725; --verde-hover: #9fd620; --blanco: #ffffff; }
    body { background: var(--negro); color: var(--blanco); font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px 24px; }
    .eyebrow-wrap { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; opacity: 0; animation: fadeUp 0.6s ease forwards 0.1s; }
    .bracket { display: flex; flex-direction: column; gap: 5px; }
    .bracket-tl { width: 12px; height: 12px; border-top: 2px solid var(--verde); border-left: 2px solid var(--verde); opacity: 0.7; }
    .bracket-bl { width: 12px; height: 12px; border-bottom: 2px solid var(--verde); border-left: 2px solid var(--verde); opacity: 0.7; }
    .bracket-tr { width: 12px; height: 12px; border-top: 2px solid var(--verde); border-right: 2px solid var(--verde); opacity: 0.7; }
    .bracket-br { width: 12px; height: 12px; border-bottom: 2px solid var(--verde); border-right: 2px solid var(--verde); opacity: 0.7; }
    .eyebrow-text { font-size: 10px; font-weight: 600; letter-spacing: 0.25em; text-transform: uppercase; color: var(--verde); }
    .logo { font-family: 'Bebas Neue', sans-serif; font-size: clamp(72px, 14vw, 160px); line-height: 0.9; letter-spacing: 0.02em; margin-bottom: 28px; opacity: 0; animation: fadeUp 0.7s ease forwards 0.25s; }
    .logo .blanco { color: var(--blanco); }
    .logo .verde  { color: var(--verde); }
    .subtitulo { font-size: clamp(15px, 2vw, 19px); color: #999999; max-width: 520px; line-height: 1.65; margin-bottom: 60px; opacity: 0; animation: fadeUp 0.7s ease forwards 0.4s; }
    .subtitulo .verde { color: var(--verde); font-weight: 600; }
    .destinos { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; opacity: 0; animation: fadeUp 0.7s ease forwards 0.55s; }
    .btn-destino { display: inline-flex; align-items: center; gap: 12px; background: var(--verde); color: var(--negro); font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 0.12em; text-decoration: none; padding: 20px 44px; transition: background 0.2s, transform 0.15s; }
    .btn-destino:hover { background: var(--verde-hover); transform: translateY(-3px); }
    .btn-destino svg { width: 18px; height: 18px; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @media (max-width: 600px) { .destinos { flex-direction: column; align-items: center; } .btn-destino { width: 280px; justify-content: center; } }
