<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Selector de Historias y Contenido — JefesHub</title>
<style>
  :root{
    --bg:#f7f7f5; --card:#ffffff; --border:#e2e0d8; --border-strong:#c9c6b8;
    --text:#1f1f1d; --text-2:#6b6a63; --text-3:#9c9a8e;
    --accent:#7a9200; --accent-bg:#eef6d6; --accent-text:#3d4a00;
    --proc-bg:#fff4d9; --proc-text:#7a5400; --proc-border:#e8c874;
    --pub-bg:#ffe3da; --pub-text:#9a3a12; --pub-border:#f0a781;
    --idea-bg:#eef1fb; --idea-text:#33408a; --idea-border:#b9c2ec;
    --radius:8px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--bg); color:var(--text); padding:24px 16px 80px;
  }
  .wrap{max-width:1450px; margin:0 auto;}
  h1{font-size:20px; font-weight:600; margin:0 0 4px;}
  .sub{color:var(--text-2); font-size:14px; margin:0 0 20px;}
  .tabs{display:flex; gap:8px; margin-bottom:16px; border-bottom:1px solid var(--border);}
  .tab{
    padding:10px 18px; cursor:pointer; font-size:14px; font-weight:500; color:var(--text-2);
    border-bottom:2px solid transparent; user-select:none;
  }
  .tab.active{color:var(--accent-text); border-bottom-color:#b5ff00;}
  .tab .count{
    display:inline-block; margin-left:6px; background:#eee; color:var(--text-2);
    border-radius:10px; padding:1px 7px; font-size:11px;
  }
  .toolbar{display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:16px; flex-wrap:wrap;}
  .toolbar-left{display:flex; align-items:center; gap:10px; flex-wrap:wrap;}
  input[type=text].search{
    padding:7px 10px; border:1px solid var(--border-strong); border-radius:var(--radius);
    font-size:13px; width:220px; background:var(--card);
  }
  select.filter{
    padding:7px 10px; border:1px solid var(--border-strong); border-radius:var(--radius);
    font-size:13px; background:var(--card);
  }
  .status{font-size:12px; color:var(--text-3); margin-bottom:10px; min-height:16px;}

  .section{margin-bottom:28px;}
  .section-head{
    display:flex; align-items:center; gap:8px; padding:8px 14px; border-radius:8px;
    margin-bottom:10px; font-weight:600; font-size:14px;
  }
  .section-head.proceso{background:var(--proc-bg); color:var(--proc-text);}
  .section-head.idea{background:var(--idea-bg); color:var(--idea-text);}
  .section-head.publicado{background:var(--pub-bg); color:var(--pub-text);}
  .section-head .scount{font-weight:400; opacity:.75; font-size:12px;}
  .empty-row{padding:14px; text-align:center; color:var(--text-3); font-size:13px; background:var(--card); border:1px dashed var(--border); border-radius:8px;}

  .table-scroll{overflow-x:auto; border:1px solid var(--border); border-radius:12px; background:var(--card);}
  table{border-collapse:collapse; width:100%; min-width:1550px;}
  thead th{
    position:sticky; top:0; background:#fafaf7; text-align:left; font-size:11px; font-weight:600;
    color:var(--text-2); text-transform:uppercase; letter-spacing:.03em; padding:10px 10px;
    border-bottom:1px solid var(--border); white-space:nowrap; z-index:1;
  }
  tbody tr{border-bottom:1px solid var(--border);}
  tbody tr:last-child{border-bottom:none;}
  tbody tr:hover{background:#fbfbf8;}
  td{padding:8px 10px; font-size:13px; vertical-align:top; line-height:1.5;}
  td.col-estado{width:130px;}
  td.col-orden{width:34px; color:var(--text-3); font-variant-numeric:tabular-nums;}
  td.col-fase{width:140px; color:var(--text-2); font-size:12px;}
  td.col-gancho{width:210px; font-weight:500;}
  td.col-desc{width:210px; color:var(--text-2);}
  td.col-dolor{width:160px;}
  td.col-instr{width:210px; color:var(--text-2);}
  td.col-reco{width:210px; color:var(--text-2);}
  td.col-fecha{width:110px;}
  td.col-link{width:140px;}

  select.estado-select{
    width:100%; font-size:12px; padding:5px 6px; border-radius:6px; border:1px solid var(--border-strong);
    font-weight:500; cursor:pointer; background:var(--card); color:var(--text);
  }
  select.estado-select.idea{background:var(--idea-bg); color:var(--idea-text); border-color:var(--idea-border);}
  select.estado-select.proceso{background:var(--proc-bg); color:var(--proc-text); border-color:var(--proc-border);}
  select.estado-select.publicado{background:var(--pub-bg); color:var(--pub-text); border-color:var(--pub-border);}

  input.cell, textarea.cell{
    width:100%; border:1px solid transparent; background:transparent; font-size:13px;
    font-family:inherit; padding:4px 6px; border-radius:6px; resize:none; color:inherit;
    line-height:1.5;
  }
  textarea.cell{min-height:34px; overflow:hidden;}
  input.cell:hover, textarea.cell:hover{border-color:var(--border);}
  input.cell:focus, textarea.cell:focus{
    outline:none; border-color:var(--accent); background:#fff; box-shadow:0 0 0 2px var(--accent-bg);
  }
  input.cell.link-input{color:#3a6ea5;}
  ::placeholder{color:var(--text-3);}

  .banco-add{
    background:var(--card); border:1px solid var(--border); border-radius:12px; padding:16px;
    margin-bottom:20px; display:flex; flex-direction:column; gap:10px;
  }
  .banco-add-row{display:flex; gap:10px; flex-wrap:wrap;}
  .banco-add textarea{
    flex:1 1 300px; min-height:60px; border:1px solid var(--border-strong); border-radius:8px;
    padding:8px 10px; font-size:14px; font-family:inherit; resize:vertical;
  }
  .banco-add input[type=text]{
    flex:1 1 200px; border:1px solid var(--border-strong); border-radius:8px; padding:8px 10px; font-size:14px;
  }
  .banco-add-btn{
    align-self:flex-end; background:#b5ff00; color:#26330a; border:none; padding:9px 18px;
    border-radius:8px; font-size:13px; font-weight:600; cursor:pointer;
  }
  .banco-add-btn:hover{background:#a3e800;}
  .banco-list{display:flex; flex-direction:column; gap:10px;}
  .banco-item{
    background:var(--card); border:1px solid var(--border); border-radius:10px; padding:12px 14px;
    display:flex; justify-content:space-between; align-items:flex-start; gap:12px;
  }
  .banco-item-text{flex:1; font-size:14px; line-height:1.5; white-space:pre-wrap;}
  .banco-item-link{font-size:12px; color:#3a6ea5; margin-top:6px; display:inline-block; word-break:break-all;}
  .banco-item-date{font-size:11px; color:var(--text-3); margin-top:6px;}
  .banco-item-actions{display:flex; gap:6px; flex-shrink:0;}
  .icon-btn{
    border:1px solid var(--border-strong); background:var(--card); border-radius:6px; width:28px; height:28px;
    display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--text-2); font-size:14px;
  }
  .icon-btn:hover{background:#f0efe9;}
  .banco-empty{color:var(--text-3); font-size:13px; padding:20px; text-align:center; border:1px dashed var(--border); border-radius:10px;}
</style>
</head>
<body>
<div class="wrap">
  <h1>Selector de Historias y Contenido</h1>
  <p class="sub">Mueve cada pieza de estado con el selector — se acomoda sola en su sección. Todos los campos son editables directo aquí.</p>

  <div class="tabs">
    <div class="tab active" data-tab="historias">Historias <span class="count" id="count-historias">50</span></div>
    <div class="tab" data-tab="contenido">Contenido <span class="count" id="count-contenido">10</span></div>
    <div class="tab" data-tab="banco">💭 Banco de ideas <span class="count" id="count-banco">0</span></div>
  </div>

  <div id="table-controls">
    <div class="toolbar">
      <div class="toolbar-left">
        <input type="text" class="search" id="search" placeholder="Buscar por gancho, descripción, dolor...">
        <select class="filter" id="filter-fase"></select>
      </div>
      <span class="status" id="status" style="margin:0;"></span>
    </div>
  </div>

  <div id="content"></div>
</div>

<script src="/js/storage-client.js"></script>

document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    currentTab = t.dataset.tab;
    filterFase = '';
    searchTerm = '';
    searchEl.value = '';
    controlsEl.style.display = currentTab === 'banco' ? 'none' : 'block';
    if(currentTab !== 'banco') buildFaseFilter();
    render();
  });
});

searchEl.addEventListener('input', () => { searchTerm = searchEl.value.toLowerCase(); render(); });
filterEl.addEventListener('change', () => { filterFase = filterEl.value; render(); });

async function loadStorage(){
  try{
    const result = await window.storage.get('jefeshub-selector-v2');
    if(result && result.value){
      const saved = JSON.parse(result.value);
      if(saved.historias) state.historias = saved.historias;
      if(saved.contenido) state.contenido = saved.contenido;
      if(saved.banco) state.banco = saved.banco;
      statusEl.textContent = 'Tu selección guardada se cargó correctamente.';
    }
  }catch(e){
    statusEl.textContent = 'Empezando selección nueva (sin datos guardados aún).';
  }
  document.getElementById('count-banco').textContent = state.banco.length;
  buildFaseFilter();
  render();
}

let saveTimer = null;
function scheduleSave(){
  statusEl.textContent = 'Guardando...';
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    try{
      await window.storage.set('jefeshub-selector-v2', JSON.stringify({historias: state.historias, contenido: state.contenido, banco: state.banco}));
      statusEl.textContent = 'Guardado.';
    }catch(e){
      statusEl.textContent = 'No se pudo guardar (revisa tu conexión).';
    }
  }, 500);
}

function buildFaseFilter(){
  if(currentTab === 'banco') return;
  const list = state[currentTab];
  const fases = [...new Set(list.map(r => r.fase))];
  filterEl.innerHTML = '<option value="">Todas las fases</option>' + fases.map(f => `<option value="${escapeHtml(f)}">${escapeHtml(f)}</option>`).join('');
  filterEl.value = filterFase;
}

function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str || '';
  return d.innerHTML;
}

          <td class="col-dolor"><textarea class="cell" placeholder="Agrega el dolor..." data-id="${r.id}" data-field="dolor">${escapeHtml(r.dolor)}</textarea></td>
          <td class="col-instr"><textarea class="cell" data-id="${r.id}" data-field="instrucciones">${escapeHtml(r.instrucciones)}</textarea></td>
          <td class="col-reco"><textarea class="cell" data-id="${r.id}" data-field="recomendacion">${escapeHtml(r.recomendacion)}</textarea></td>
          <td class="col-link"><input type="text" class="cell link-input" placeholder="https://..." value="${escapeHtml(r.linkRef)}" data-id="${r.id}" data-field="linkRef"></td>
          <td class="col-link"><input type="text" class="cell link-input" placeholder="https://..." value="${escapeHtml(r.linkArchivo)}" data-id="${r.id}" data-field="linkArchivo"></td>
        `;
        tb.appendChild(tr);
      });
      scrollWrap.appendChild(table);
      section.appendChild(scrollWrap);
    }
    contentEl.appendChild(section);
  });

  contentEl.querySelectorAll('select.estado-select').forEach(sel => {
    sel.addEventListener('change', onFieldChange);
  });
  contentEl.querySelectorAll('input.cell, textarea.cell').forEach(inp => {
    inp.addEventListener('input', onFieldChange);
    if(inp.tagName === 'TEXTAREA'){
      autoGrow(inp);
      inp.addEventListener('input', () => autoGrow(inp));
    }
  });
}

function autoGrow(el){
  el.style.height = 'auto';
  el.style.height = el.scrollHeight + 'px';
}

function onFieldChange(e){
  const id = e.target.dataset.id;
  const field = e.target.dataset.field;
  const list = state[currentTab];
  const row = list.find(r => r.id === id);
  if(!row) return;
  row[field] = e.target.value;
  if(field === 'estado'){
    render();
  }
  scheduleSave();
}

function renderBanco(){
  contentEl.innerHTML = '';

  const addBox = document.createElement('div');
  addBox.className = 'banco-add';
  addBox.innerHTML = `
    <div class="banco-add-row">
      <textarea id="banco-idea-input" placeholder="Escribe la idea, nota o referencia que quieres guardar para después..."></textarea>
      <input type="text" id="banco-link-input" placeholder="Link (opcional)">
    </div>
    <button class="banco-add-btn" id="banco-add-btn">Agregar a la lista</button>
  `;
  contentEl.appendChild(addBox);

  document.getElementById('banco-add-btn').addEventListener('click', () => {
    const ideaEl = document.getElementById('banco-idea-input');
    const linkEl = document.getElementById('banco-link-input');
    const texto = ideaEl.value.trim();
    const link = linkEl.value.trim();
    if(!texto && !link) return;
    state.banco.unshift({
      id: 'b' + Date.now(),
      texto: texto,
      link: link,
      fecha: new Date().toLocaleDateString('es-MX', {day:'2-digit', month:'short', year:'numeric'})
    });
    ideaEl.value = '';
    linkEl.value = '';
    document.getElementById('count-banco').textContent = state.banco.length;
    renderBanco();
    scheduleSave();
  });

  const list = document.createElement('div');
  list.className = 'banco-list';

  if(state.banco.length === 0){
    list.innerHTML = '<div class="banco-empty">Todavía no has guardado nada aquí. Agrega tu primera idea, link o referencia arriba.</div>';
  } else {
    state.banco.forEach(item => {
      const card = document.createElement('div');
      card.className = 'banco-item';
      card.innerHTML = `
        <div style="flex:1;">
          ${item.texto ? `<div class="banco-item-text">${escapeHtml(item.texto)}</div>` : ''}
          ${item.link ? `<a class="banco-item-link" href="${escapeHtml(item.link)}" target="_blank" rel="noopener">${escapeHtml(item.link)}</a>` : ''}
          <div class="banco-item-date">${escapeHtml(item.fecha)}</div>
        </div>
        <div class="banco-item-actions">
          <button class="icon-btn" data-id="${item.id}" title="Eliminar">✕</button>
        </div>
      `;
      list.appendChild(card);
    });
  }
  contentEl.appendChild(list);

  contentEl.querySelectorAll('.banco-item-actions .icon-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.dataset.id;
      state.banco = state.banco.filter(i => i.id !== id);
      document.getElementById('count-banco').textContent = state.banco.length;
      renderBanco();
      scheduleSave();
    });
  });
}

loadStorage();
</script>
</body>
</html>
