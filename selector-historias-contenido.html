<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agente de Historias y Contenido — JefesHub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0F0B16;
    --surface:#181120;
    --surface-2:#211829;
    --line:#332A3D;
    --text:#F3EEF9;
    --text-dim:#B6A9C7;
    --accent:#B8F725;
    --accent-soft:#2E3610;
    --t1:#1E3A8A;
    --t2:#3B82C4;
    --t3:#38BDF8;
    --t4:#FACC15;
    --t5:#F5B21C;
    --t6:#FB923C;
    --t7:#F97316;
    --t8:#EF4444;
    --t9:#DC2626;
    --t10:#B91C1C;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:radial-gradient(1200px 600px at 50% -10%, #241733 0%, var(--bg) 55%);
    color:var(--text);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
    padding:28px 16px 80px;
  }
  h1,.display{font-family:'Sora',sans-serif;}
  .wrap{max-width:1400px;margin:0 auto;}
  h1{font-size:clamp(24px,3.4vw,32px);font-weight:800;margin:0 0 6px;}
  .sub{color:var(--text-dim);font-size:14px;margin:0 0 22px;line-height:1.5;max-width:640px;}

  .tabs{display:flex;gap:6px;margin-bottom:18px;border-bottom:1px solid var(--line);flex-wrap:wrap;}
  .tab{padding:10px 16px;cursor:pointer;font-size:14px;font-weight:600;color:var(--text-dim);border-bottom:2px solid transparent;user-select:none;font-family:'Sora',sans-serif;}
  .tab.active{color:var(--accent);border-bottom-color:var(--accent);}
  .tab .count{display:inline-block;margin-left:6px;background:var(--surface-2);color:var(--text-dim);border-radius:10px;padding:1px 8px;font-size:11px;font-family:'JetBrains Mono',monospace;}

  .toolbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px;flex-wrap:wrap;}
  .toolbar-left{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  input[type=text].search, select.filter{
    padding:9px 12px;border:1px solid var(--line);border-radius:10px;font-size:13px;
    background:var(--surface);color:var(--text);font-family:'Inter',sans-serif;outline:none;
  }
  input[type=text].search{width:240px;}
  input[type=text].search::placeholder{color:var(--text-dim);}
  input[type=text].search:focus, select.filter:focus{border-color:var(--accent);}
  .status{font-size:12px;color:var(--text-dim);margin:0;min-height:16px;font-family:'JetBrains Mono',monospace;}

  .section{margin-bottom:30px;}
  .section-head{display:flex;align-items:center;gap:8px;padding:9px 16px;border-radius:10px;margin-bottom:14px;font-weight:700;font-size:13.5px;font-family:'Sora',sans-serif;letter-spacing:.02em;}
  .section-head.proceso{background:#332708;color:#F5C84C;}
  .section-head.idea{background:#1B2142;color:#A8B4F0;}
  .section-head.publicado{background:#3A2013;color:#FF9466;}
  .section-head .scount{font-weight:400;opacity:.7;font-size:12px;font-family:'JetBrains Mono',monospace;}
  .empty-row{padding:18px;text-align:center;color:var(--text-dim);font-size:13px;background:var(--surface);border:1px dashed var(--line);border-radius:12px;}

  .cards-grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(300px, 1fr));gap:14px;}
  .item-card{
    background:var(--surface);border:1px solid var(--line);border-left:4px solid var(--horizon, var(--t1));
    border-radius:14px;padding:16px 18px;display:flex;flex-direction:column;gap:10px;
    touch-action:pan-y;
  }
  .item-top{display:flex;align-items:center;gap:8px;justify-content:space-between;}
  select.estado-select{
    font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;
    padding:5px 10px;border-radius:100px;border:1px solid transparent;cursor:pointer;
  }
  select.estado-select.idea{background:#1B2142;color:#A8B4F0;border-color:#3A4380;}
  select.estado-select.proceso{background:#332708;color:#F5C84C;border-color:#6B4F14;}
  select.estado-select.publicado{background:#3A2013;color:#FF9466;border-color:#7A3A1E;}
  .fecha-input{
    width:76px;text-align:right;background:transparent;border:1px solid var(--line);border-radius:8px;
    color:var(--text-dim);font-family:'JetBrains Mono',monospace;font-size:11.5px;padding:5px 8px;outline:none;
  }
  .fecha-input:focus{border-color:var(--accent);color:var(--text);}
  textarea.gancho-input{
    width:100%;border:none;background:transparent;color:var(--text);font-family:'Sora',sans-serif;
    font-size:15.5px;font-weight:700;line-height:1.4;resize:none;padding:0;outline:none;min-height:24px;
  }
  .item-fase{font-size:11.5px;color:var(--text-dim);font-family:'JetBrains Mono',monospace;}
  .item-details{border-top:1px solid var(--line);padding-top:8px;}
  .item-details summary{cursor:pointer;font-size:12px;color:var(--horizon, var(--accent));font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.03em;list-style:none;}
  .item-details summary::-webkit-details-marker{display:none;}
  .detail-grid{display:flex;flex-direction:column;gap:10px;margin-top:10px;}
  .detail-field label{display:block;font-size:10.5px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.04em;font-family:'JetBrains Mono',monospace;margin-bottom:4px;}
  .detail-field textarea, .detail-field input{
    width:100%;background:var(--surface-2);border:1px solid var(--line);border-radius:8px;color:var(--text);
    font-family:'Inter',sans-serif;font-size:13px;padding:8px 10px;resize:none;outline:none;line-height:1.5;
  }
  .detail-field textarea:focus, .detail-field input:focus{border-color:var(--accent);}
  .detail-field input.link-input{color:#7CB9E8;}

  .banco-add{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:18px;margin-bottom:26px;display:flex;flex-direction:column;gap:12px;}
  .banco-add-row{display:flex;gap:10px;flex-wrap:wrap;}
  .banco-add textarea{flex:1 1 300px;min-height:64px;background:var(--surface-2);border:1px solid var(--line);border-radius:10px;color:var(--text);padding:10px 12px;font-family:'Inter',sans-serif;font-size:14px;resize:vertical;outline:none;}
  .banco-add textarea:focus{border-color:var(--accent);}
  .banco-add input[type=text]{flex:1 1 200px;background:var(--surface-2);border:1px solid var(--line);border-radius:10px;color:var(--text);padding:10px 12px;font-size:14px;outline:none;}
  .banco-add input[type=text]:focus{border-color:var(--accent);}
  .banco-add-actions{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
  .btn{font-family:'Inter',sans-serif;font-weight:700;font-size:13px;padding:10px 16px;border-radius:9px;cursor:pointer;border:none;transition:.15s;}
  .btn-ghost{background:var(--accent-soft);border:1px solid var(--accent);color:var(--accent);}
  .btn-ghost:hover{background:var(--accent);color:#0F0B16;}
  .btn-solid{background:var(--accent);color:#0F0B16;}
  .btn-solid:hover{filter:brightness(1.08);}
  .btn:disabled{opacity:.5;cursor:wait;}
  .suggest-result{display:flex;flex-direction:column;gap:10px;background:var(--surface-2);border-radius:10px;padding:12px 14px;}
  .suggest-result label{display:block;font-size:10.5px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.04em;font-family:'JetBrains Mono',monospace;margin-bottom:4px;}
  .suggest-result textarea{width:100%;background:var(--surface);border:1px solid var(--line);border-radius:8px;color:var(--text);font-family:'Inter',sans-serif;font-size:13.5px;padding:8px 10px;resize:vertical;outline:none;}
  .suggest-result textarea:focus{border-color:var(--accent);}
  .suggest-status{font-size:12px;color:var(--text-dim);min-height:16px;}
  .suggest-status.error{color:#F87171;}

  .banco-section-head{font-family:'Sora',sans-serif;font-weight:700;font-size:14px;margin-bottom:10px;color:var(--text);}
  .banco-list{display:flex;flex-direction:column;gap:10px;margin-bottom:28px;}
  .banco-item{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:14px 16px;display:flex;justify-content:space-between;align-items:flex-start;gap:12px;}
  .banco-item.aprobada{border-left:4px solid var(--accent);}
  .banco-item-text{flex:1;font-size:14px;line-height:1.5;white-space:pre-wrap;}
  .banco-item-gancho{font-family:'Sora',sans-serif;font-weight:700;font-size:15px;margin-bottom:4px;}
  .banco-item-caption{font-size:13px;color:var(--text-dim);white-space:pre-wrap;}
  .banco-item-link{font-size:12px;color:#7CB9E8;margin-top:6px;display:inline-block;word-break:break-all;}
  .banco-item-date{font-size:11px;color:var(--text-dim);margin-top:6px;font-family:'JetBrains Mono',monospace;}
  .banco-item-actions{display:flex;gap:6px;flex-shrink:0;}
  .icon-btn{border:1px solid var(--line);background:var(--surface-2);border-radius:8px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-dim);font-size:14px;}
  .icon-btn:hover{border-color:#EF4444;color:#EF4444;}
  .banco-empty{color:var(--text-dim);font-size:13px;padding:20px;text-align:center;border:1px dashed var(--line);border-radius:12px;}
</style>
</head>
<body>
<div class="wrap">
  <h1>Agente de Historias y Contenido</h1>
  <p class="sub">Cambia el estado con el selector de cada tarjeta — se acomoda sola en su sección. Todo es editable directo aquí. El borde de color muestra qué tan próxima está la fecha: rojo es urgente, azul es sin prisa o sin fecha.</p>

  <div class="tabs">
    <div class="tab active" data-tab="historias">Historias <span class="count" id="count-historias">50</span></div>
    <div class="tab" data-tab="contenido">Contenido <span class="count" id="count-contenido">10</span></div>
    <div class="tab" data-tab="banco">💭 Banco de ideas <span class="count" id="count-banco">0</span></div>
  </div>

  <div id="table-controls">
    <div class="toolbar">
      <div class="toolbar-left">
        <input type="text" class="search" id="search" placeholder="Buscar por gancho, descripción, dolor...">
        <select class="filter" id="filter-fase"></select>
      </div>
      <span class="status" id="status" style="margin:0;"></span>
    </div>
  </div>

  <div id="content"></div>
</div>

)", "descripcion": "Continúa la serie de tips con un negocio distinto.", "dolor": "", "instrucciones": "Mismo formato que la parte 1, pero con otro giro de negocio.", "recomendacion": "Menciona 'parte 2' explícitamente para que la reconozcan como serie.", "linkRef": "", "linkArchivo": "", "fecha": "", "estado": "idea"}, {"id": "h10", "orden": 10, "fase": "Semana 1 · Atraer/Conexión", "gancho": "Yo igual hacía 10 puestos en mi negocio", "descripcion": "Puente narrativo: conecta tu historia con la del amigo de mudanzas.", "dolor": "", "instrucciones": "Habla a cámara en tono de complicidad ('yo igual viví esto').", "recomendacion": "No lo presentes como el origen de tu marca — preséntalo como anécdota compartida.", "linkRef": "", "linkArchivo": "", "fecha": "", "estado": "idea"}, {"id": "h11", "orden": 11, "fase": "Semana 1 · Atraer/Conexión", "gancho": "Mira lo que me escribieron", "descripcion": "Prueba social ligera con un comentario real sobre no dar abasto.", "dolor": "", "instrucciones": "Captura de pantalla del comentario + tu reacción grabada encima.", "recomendacion": "Elige un comentario que hable del dolor (no dar abasto), no uno de venta directa.", "linkRef": "", "linkArchivo": "", "fecha": "", "estado": "idea"}, {"id": "h12", "orden": 12, "fase": "Semana 1 · Atraer/Conexión", "gancho": "Teaser viaje a París", "descripcion": "Cierre de semana con gancho de lifestyle, sin explicar el porqué todavía.", "dolor": "", "instrucciones": "Clip corto de maleta o aeropuerto, sin contexto explícito.", "recomendacion": "Publica solo si ya tienes tus links de difusión listos; si no, sustitúyela.", "linkRef": "", "linkArchivo": "", "fecha": "", "estado": "idea"}, {"id": "h13", "orden": 13, "fase": "Semana 2 · Educar/Objeciones", "gancho": "¿Cómo hago el link de mi WhatsApp?", "descripcion": "Pregunta falsa que sirve de gancho para presentar el Hub de forma orgánica.", "dolor": "", "instrucciones": "Screenshot de la 'pregunta' + tu respuesta en video.", "recomendacion": // ---------- HORIZONTE DE TIEMPO (color rojo=proximo -> azul=lejano/sin fecha) ----------
function parseFechaDDMM(str){
  if(!str) return null;
  const m = str.trim().match(/^(\d{1,2})\/(\d{1,2})$/);
  if(!m) return null;
  const day = parseInt(m[1], 10);
  const month = parseInt(m[2], 10) - 1;
  if(month < 0 || month > 11 || day < 1 || day > 31) return null;
  const now = new Date();
  let d = new Date(now.getFullYear(), month, day);
  if((now - d) / 86400000 > 30) d = new Date(now.getFullYear() + 1, month, day);
  return d;
}

  const d = parseFechaDDMM(fechaStr);
  if(!d) return 0; // sin fecha valida = lo mas lejano = azul
  const today = new Date(); today.setHours(0,0,0,0);
  const days = Math.round((d - today) / 86400000);
  if(days <= 14) return 9; // proximas 2 semanas = rojo, lo mas urgente
  const span = 120;
  const t = Math.min(1, Math.max(0, (days - 14) / (span - 14)));
  return Math.max(0, Math.min(8, Math.round(8 - t * 8)));
}

function horizonColorVar(fechaStr){
  return 'var(--t' + (horizonIndex(fechaStr) + 1) + ')';
}

function buildFaseFilter(){
  if(currentTab === 'banco') return;
  const list = state[currentTab];
  const fases = [...new Set(list.map(r => r.fase))];
  filterEl.innerHTML = '<option value="">Todas las fases</option>' + fases.map(f => `<option value="${escapeHtml(f)}">${escapeHtml(f)}</option>`).join('');
  filterEl.value = filterFase;
}

function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str || '';
  return d.innerHTML;
}

function render(){
  if(currentTab === 'banco'){
    renderBanco();
    return;
  }
  const list = state[currentTab];
  let rows = list.filter(r => {
    if(filterFase && r.fase !== filterFase) return false;
    if(searchTerm){
      const hay = (r.gancho + ' ' + r.descripcion + ' ' + r.dolor + ' ' + r.instrucciones + ' ' + r.recomendacion).toLowerCase();
      if(!hay.includes(searchTerm)) return false;
    }
    return true;
  });

  contentEl.innerHTML = '';
  SECTIONS.forEach(sec => {
    const secRows = rows.filter(r => r.estado === sec.key).sort((a,b) => horizonIndex(b.fecha) - horizonIndex(a.fecha));
    const section = document.createElement('div');
    section.className = 'section';
    const head = document.createElement('div');
    head.className = 'section-head ' + sec.cls;
    head.innerHTML = `${sec.emoji} ${sec.label} <span class="scount">${secRows.length}</span>`;
    section.appendChild(head);

    if(secRows.length === 0){
      const empty = document.createElement('div');
      empty.className = 'empty-row';
      empty.textContent = 'Nada aquí todavía.';
      section.appendChild(empty);
    } else {
      const grid = document.createElement('div');
      grid.className = 'cards-grid';
      secRows.forEach(r => {
        const card = document.createElement('div');
        card.className = 'item-card';
        card.style.setProperty('--horizon', horizonColorVar(r.fecha));
        card.innerHTML = `
          <div class="item-top">
            <select class="estado-select ${r.estado}" data-id="${r.id}" data-field="estado">
              <option value="idea" ${r.estado==='idea'?'selected':''}>💡 Idea</option>
              <option value="proceso" ${r.estado==='proceso'?'selected':''}>⚙️ En proceso</option>
              <option value="publicado" ${r.estado==='publicado'?'selected':''}>🔥 Publicado</option>
            </select>
            <input type="text" class="fecha-input" placeholder="dd/mm" value="${escapeHtml(r.fecha)}" data-id="${r.id}" data-field="fecha">
          </div>
          <textarea class="gancho-input" data-id="${r.id}" data-field="gancho">${escapeHtml(r.gancho)}</textarea>
          <div class="item-fase">${escapeHtml(r.fase)}</div>
          <details class="item-details">
            <summary>Ver detalles</summary>
            <div class="detail-grid">
              <div class="detail-field"><label>Descripción / ángulo</label><textarea data-id="${r.id}" data-field="descripcion">${escapeHtml(r.descripcion)}</textarea></div>
              <div class="detail-field"><label>Dolor con que conectamos</label><textarea placeholder="Agrega el dolor..." data-id="${r.id}" data-field="dolor">${escapeHtml(r.dolor)}</textarea></div>
              <div class="detail-field"><label>Instrucciones</label><textarea data-id="${r.id}" data-field="instrucciones">${escapeHtml(r.instrucciones)}</textarea></div>
              <div class="detail-field"><label>Recomendación</label><textarea data-id="${r.id}" data-field="recomendacion">${escapeHtml(r.recomendacion)}</textarea></div>
              <div class="detail-field"><label>Link de referencia</label><input type="text" class="link-input" placeholder="https://..." value="${escapeHtml(r.linkRef)}" data-id="${r.id}" data-field="linkRef"></div>
              <div class="detail-field"><label>Link de archivo terminado</label><input type="text" class="link-input" placeholder="https://..." value="${escapeHtml(r.linkArchivo)}" data-id="${r.id}" data-field="linkArchivo"></div>
            </div>
          </details>
        `;
        grid.appendChild(card);
      });
      section.appendChild(grid);
    }
    contentEl.appendChild(section);
  });

  contentEl.querySelectorAll('select.estado-select').forEach(sel => {
    sel.addEventListener('change', onFieldChange);
  });
  contentEl.querySelectorAll('.fecha-input, .gancho-input, .detail-field input, .detail-field textarea').forEach(inp => {
    inp.addEventListener('input', onFieldChange);
    if(inp.tagName === 'TEXTAREA'){
      autoGrow(inp);
      inp.addEventListener('input', () => autoGrow(inp));
    }
  });
  contentEl.querySelectorAll('.item-card').forEach(card => {
    attachSwipeToDetails(card, card.querySelector('.item-details'));
  });
}

function autoGrow(el){
  el.style.height = 'auto';
  el.style.height = el.scrollHeight + 'px';
}

// En escritorio "Ver detalles" ya expande con el <details> nativo. En touch
// agregamos ademas un swipe hacia la derecha sobre la tarjeta para revelarlo
// sin tener que apuntarle al summary con el dedo.
function attachSwipeToDetails(card, detailsEl){
  if(!detailsEl) return;
  const OPEN_THRESHOLD = 46;
  let startX = 0, startY = 0, lastDx = 0, dragging = false, horizontal = false;

  card.addEventListener('touchstart', (e) => {
    if(e.target.closest('input, textarea, select, button, a, summary')){ dragging = false; return; }
    const touch = e.touches[0];
    startX = touch.clientX;
    startY = touch.clientY;
    lastDx = 0;
    dragging = true;
    horizontal = false;
  }, {passive:true});

  card.addEventListener('touchmove', (e) => {
    if(!dragging) return;
    const touch = e.touches[0];
    const dx = touch.clientX - startX;
    const dy = touch.clientY - startY;
    if(!horizontal){
      if(Math.abs(dx) < 8 && Math.abs(dy) < 8) return;
      horizontal = Math.abs(dx) > Math.abs(dy) * 1.3;
      if(!horizontal){ dragging = false; return; }
    }
    if(dx > 0){
      e.preventDefault();
      lastDx = dx;
      card.style.transform = `translateX(${Math.min(dx * 0.35, 40)}px)`;
    }
  }, {passive:false});

  function endSwipe(){
    if(!dragging) return;
    dragging = false;
    card.style.transition = 'transform .2s ease';
    card.style.transform = '';
    setTimeout(() => { card.style.transition = ''; }, 220);
    if(horizontal && lastDx > OPEN_THRESHOLD){
      detailsEl.open = true;
    }
    horizontal = false;
    lastDx = 0;
  }
  card.addEventListener('touchend', endSwipe);
  card.addEventListener('touchcancel', endSwipe);
}

function onFieldChange(e){
  const id = e.target.dataset.id;
  const field = e.target.dataset.field;
  const list = state[currentTab];
  const row = list.find(r => r.id === id);
  if(!row) return;
  row[field] = e.target.value;
  if(field === 'estado' || field === 'fecha'){
    render();
  }
  scheduleSave();
}

// ---------- BANCO DE IDEAS ----------
function renderBanco(){
  contentEl.innerHTML = '';

  const addBox = document.createElement('div');
  addBox.className = 'banco-add';
  addBox.innerHTML = `
    <div class="banco-add-row">
      <textarea id="banco-idea-input" placeholder="Escribe la idea, nota o referencia que quieres guardar para después..."></textarea>
      <input type="text" id="banco-link-input" placeholder="Link (opcional)">
    </div>
    <div class="banco-add-actions">
      <button class="btn btn-ghost" id="banco-suggest-btn" type="button">✨ Sugerir gancho y caption</button>
      <button class="btn btn-solid" id="banco-add-btn" type="button" style="margin-left:auto;">Agregar a la lista</button>
    </div>
    <div id="banco-suggest-result" class="suggest-result" hidden>
      <div><label>Gancho</label><textarea id="banco-gancho-input" rows="2"></textarea></div>
      <div><label>Caption</label><textarea id="banco-caption-input" rows="3"></textarea></div>
    </div>
    <div id="banco-suggest-status" class="suggest-status"></div>
  `;
  contentEl.appendChild(addBox);

  const suggestBtn = document.getElementById('banco-suggest-btn');
  const suggestStatus = document.getElementById('banco-suggest-status');
  const suggestResult = document.getElementById('banco-suggest-result');

  suggestBtn.addEventListener('click', async () => {
    const idea = document.getElementById('banco-idea-input').value.trim();
    suggestStatus.className = 'suggest-status';
    suggestStatus.textContent = '';
    if(!idea){
      suggestStatus.textContent = 'Escribe la idea primero.';
      suggestStatus.classList.add('error');
      return;
    }
    suggestBtn.disabled = true;
    suggestBtn.textContent = 'Pensando...';
    try{
      const res = await fetch('/api/sugerir-contenido', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ idea }),
      });
      const data = await res.json();
      if(!res.ok){
        suggestStatus.textContent = data.error || 'No se pudo generar la sugerencia.';
        suggestStatus.classList.add('error');
        return;
      }
      document.getElementById('banco-gancho-input').value = data.gancho || '';
      document.getElementById('banco-caption-input').value = data.caption || '';
      suggestResult.hidden = false;
    }catch(e){
      suggestStatus.textContent = 'Error de conexión. Intenta de nuevo.';
      suggestStatus.classList.add('error');
    }finally{
      suggestBtn.disabled = false;
      suggestBtn.textContent = '✨ Sugerir gancho y caption';
    }
  });

  document.getElementById('banco-add-btn').addEventListener('click', () => {
    const ideaEl = document.getElementById('banco-idea-input');
    const linkEl = document.getElementById('banco-link-input');
    const ganchoEl = document.getElementById('banco-gancho-input');
    const captionEl = document.getElementById('banco-caption-input');
    const texto = ideaEl.value.trim();
    const link = linkEl.value.trim();
    const gancho = ganchoEl ? ganchoEl.value.trim() : '';
    const caption = captionEl ? captionEl.value.trim() : '';
    if(!texto && !link && !gancho) return;
    state.banco.unshift({
      id: 'b' + Date.now(),
      texto, link, gancho, caption,
      aprobada: !!gancho,
      fecha: new Date().toLocaleDateString('es-MX', {day:'2-digit', month:'short', year:'numeric'})
    });
    ideaEl.value = '';
    linkEl.value = '';
    suggestResult.hidden = true;
    suggestStatus.textContent = '';
    document.getElementById('count-banco').textContent = state.banco.length;
    renderBanco();
    scheduleSave();
  });

  const aprobadas = state.banco.filter(i => i.aprobada);
  const crudas = state.banco.filter(i => !i.aprobada);

  const aprobadasBlock = document.createElement('div');
  aprobadasBlock.innerHTML = '<div class="banco-section-head">✅ Ideas aprobadas</div>';
  const aprobadasList = document.createElement('div');
  aprobadasList.className = 'banco-list';
  if(aprobadas.length === 0){
    aprobadasList.innerHTML = '<div class="banco-empty">Todavía no hay ideas desarrolladas. Usa "Sugerir gancho y caption" al agregar una idea.</div>';
  } else {
    aprobadas.forEach(item => aprobadasList.appendChild(bancoItemCard(item)));
  }
  aprobadasBlock.appendChild(aprobadasList);
  contentEl.appendChild(aprobadasBlock);

  const crudasBlock = document.createElement('div');
  crudasBlock.innerHTML = '<div class="banco-section-head">💭 Ideas crudas</div>';
  const crudasList = document.createElement('div');
  crudasList.className = 'banco-list';
  if(crudas.length === 0){
    crudasList.innerHTML = '<div class="banco-empty">Todavía no has guardado nada aquí. Agrega tu primera idea, link o referencia arriba.</div>';
  } else {
    crudas.forEach(item => crudasList.appendChild(bancoItemCard(item)));
  }
  crudasBlock.appendChild(crudasList);
  contentEl.appendChild(crudasBlock);
}

function bancoItemCard(item){
  const card = document.createElement('div');
  card.className = 'banco-item' + (item.aprobada ? ' aprobada' : '');
  card.innerHTML = `
    <div style="flex:1;">
      ${item.aprobada ? `<div class="banco-item-gancho">${escapeHtml(item.gancho)}</div>` : ''}
      ${item.aprobada && item.caption ? `<div class="banco-item-caption">${escapeHtml(item.caption)}</div>` : ''}
      ${item.texto ? `<div class="banco-item-text"${item.aprobada ? ' style="margin-top:6px;opacity:.7;"' : ''}>${escapeHtml(item.texto)}</div>` : ''}
      ${item.link ? `<a class="banco-item-link" href="${escapeHtml(item.link)}" target="_blank" rel="noopener">${escapeHtml(item.link)}</a>` : ''}
      <div class="banco-item-date">${escapeHtml(item.fecha)}</div>
    </div>
    <div class="banco-item-actions">
      <button class="icon-btn" title="Eliminar">✕</button>
    </div>
  `;
  card.querySelector('.icon-btn').addEventListener('click', () => {
    state.banco = state.banco.filter(i => i.id !== item.id);
    document.getElementById('count-banco').textContent = state.banco.length;
    renderBanco();
    scheduleSave();
  });
  return card;
}

// ---------- CARGA Y GUARDADO ----------
async function loadStorage(){
  try{
    const result = await window.storage.get('jefeshub-selector-v2');
    if(result && result.value){
      const saved = JSON.parse(result.value);
      if(saved.historias) state.historias = saved.historias;
      if(saved.contenido) state.contenido = saved.contenido;
      if(saved.banco){
        saved.banco.forEach(b => { if(b.aprobada === undefined) b.aprobada = !!b.gancho; });
        state.banco = saved.banco;
      }
      statusEl.textContent = 'Tu selección guardada se cargó correctamente.';
    }
  }catch(e){
    statusEl.textContent = 'Empezando selección nueva (sin datos guardados aún).';
  }
  document.getElementById('count-banco').textContent = state.banco.length;
  buildFaseFilter();
  render();
}

let saveTimer = null;
let pendingSave = false;

function scheduleSave(){
  pendingSave = true;
  statusEl.textContent = 'Guardando...';
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => doSave(), 500);
}

async function doSave(opts){
  clearTimeout(saveTimer);
  saveTimer = null;
  if(!pendingSave) return;
  try{
    await window.storage.set('jefeshub-selector-v2', JSON.stringify({historias: state.historias, contenido: state.contenido, banco: state.banco}), opts);
    pendingSave = false;
    statusEl.textContent = 'Guardado.';
  }catch(e){
    statusEl.textContent = 'No se pudo guardar (revisa tu conexión).';
  }
}

// Si la pestaña se oculta o se cierra con un guardado pendiente (dentro del debounce
// de 500ms), lo mandamos de inmediato con keepalive para que sobreviva al refresh/cierre.
document.addEventListener('visibilitychange', () => {
  if(document.visibilityState === 'hidden' && pendingSave) doSave({keepalive:true});
});
window.addEventListener('pagehide', () => {
  if(pendingSave) doSave({keepalive:true});
});

loadStorage();
</script>
