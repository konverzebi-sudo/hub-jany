<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hub de Viajes con Jany</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --negro: #080808;
      --verde: #b8f725;
      --verde-hover: #9fd620;
      --blanco: #ffffff;
    }

    body {
      background: var(--negro);
      color: var(--blanco);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
      overflow: hidden;
    }

    /* Corchetes decorativos */
    .eyebrow-wrap {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.1s;
    }

    .bracket {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .bracket-tl { width: 12px; height: 12px; border-top: 2px solid var(--verde); border-left: 2px solid var(--verde); opacity: 0.7; }
    .bracket-bl { width: 12px; height: 12px; border-bottom: 2px solid var(--verde); border-left: 2px solid var(--verde); opacity: 0.7; }
    .bracket-tr { width: 12px; height: 12px; border-top: 2px solid var(--verde); border-right: 2px solid var(--verde); opacity: 0.7; }
    .bracket-br { width: 12px; height: 12px; border-bottom: 2px solid var(--verde); border-right: 2px solid var(--verde); opacity: 0.7; }

    .eyebrow-text {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--verde);
    }

    /* Título */
    .titulo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(52px, 10vw, 120px);
      line-height: 0.92;
      letter-spacing: 0.01em;
      text-transform: uppercase;
      margin-bottom: 24px;
      opacity: 0;
      animation: fadeUp 0.7s ease forwards 0.25s;
    }

    .titulo .verde { color: var(--verde); }

    /* Subtítulo */
    .subtitulo {
      font-size: clamp(15px, 2vw, 18px);
      color: #999999;
      margin-bottom: 64px;
      line-height: 1.6;
      opacity: 0;
      animation: fadeUp 0.7s ease forwards 0.4s;
    }

    .subtitulo .verde { color: var(--verde); font-weight: 600; }

    /* Botones destinos */
    .destinos {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      justify-content: center;
      opacity: 0;
      animation: fadeUp 0.7s ease forwards 0.55s;
    }

    .btn-destino {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: var(--verde);
      color: var(--negro);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 0.12em;
      text-decoration: none;
      padding: 20px 48px;
      transition: background 0.2s, transform 0.15s;
    }

    .btn-destino:hover {
      background: var(--verde-hover);
      transform: translateY(-3px);
    }

    .btn-destino svg {
      width: 18px;
      height: 18px;
    }

    /* Animación */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 600px) {
      .destinos { flex-direction: column; align-items: center; }
      .btn-destino { width: 280px; justify-content: center; }
    }
  </style>
</head>
<body>

  <!-- Eyebrow -->
  <div class="eyebrow-wrap">
    <div class="bracket">
      <div class="bracket-tl"></div>
      <div class="bracket-bl"></div>
    </div>
    <span class="eyebrow-text">Plataforma de Viajeros</span>
    <div class="bracket">
      <div class="bracket-tr"></div>
      <div class="bracket-br"></div>
    </div>
  </div>

  <!-- Título -->
  <h1 class="titulo">
    HUB DE <span class="verde">VIAJES</span> CON JANY
  </h1>

  <!-- Subtítulo -->
  <p class="subtitulo">
    Todo lo que me hubiera gustado <span class="verde">saber antes de viajar</span>
  </p>

  <!-- Destinos -->
  <div class="destinos">
    <a class="btn-destino" href="https://konverzebi-sudo.github.io/enparis">
      PARIS
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M7 17L17 7M17 7H7M17 7v10"/>
      </svg>
    </a>
    <a class="btn-destino" href="https://konverzebi-sudo.github.io/enyucatan">
      YUCATÁN
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M7 17L17 7M17 7H7M17 7v10"/>
      </svg>
    </a>
  </div>

</body>
</html>
