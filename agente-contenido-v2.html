<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jefe Contenido — JefesHub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0F0B16;
    --surface:#181120;
    --surface-2:#211829;
    --line:#332A3D;
    --text:#F3EEF9;
    --text-dim:#B6A9C7;
    --accent:#B8F725;
    --accent-soft:#2E3610;
    --t1:#1E3A8A;--t2:#3B82C4;--t3:#38BDF8;--t4:#FACC15;--t5:#F5B21C;
    --t6:#FB923C;--t7:#F97316;--t8:#EF4444;--t9:#DC2626;--t10:#B91C1C;
    --adq:#6366F1;--adq-soft:#1E1B4B;
    --con:#0EA5E9;--con-soft:#082F49;
    --conv:#22C55E;--conv-soft:#052E16;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:radial-gradient(1200px 600px at 50% -10%,#241733 0%,var(--bg) 55%);color:var(--text);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;padding:28px 16px 80px;}
  h1,.display{font-family:'Sora',sans-serif;}
  .wrap{max-width:1400px;margin:0 auto;}
  h1{font-size:clamp(24px,3.4vw,32px);font-weight:800;margin:0 0 6px;}
  .sub{color:var(--text-dim);font-size:14px;margin:0 0 22px;line-height:1.5;max-width:640px;}

  /* TABS */
  .tabs{display:flex;gap:6px;margin-bottom:18px;border-bottom:1px solid var(--line);flex-wrap:wrap;}
  .tab{padding:10px 16px;cursor:pointer;font-size:14px;font-weight:600;color:var(--text-dim);border-bottom:2px solid transparent;user-select:none;font-family:'Sora',sans-serif;}
  .tab.active{color:var(--accent);border-bottom-color:var(--accent);}
  .tab .count{display:inline-block;margin-left:6px;background:var(--surface-2);color:var(--text-dim);border-radius:10px;padding:1px 8px;font-size:11px;font-family:'JetBrains Mono',monospace;}
  .tab.tab-agente .count{background:var(--accent-soft);color:var(--accent);}

  /* STATS BAR */
  .stats-bar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;padding:12px 16px;background:var(--surface);border:1px solid var(--line);border-radius:12px;}
  .stat-pill{display:flex;align-items:center;gap:6px;font-size:12px;font-family:'JetBrains Mono',monospace;}
  .stat-pill .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .stat-pill .dot-adq{background:var(--adq);}
  .stat-pill .dot-con{background:var(--con);}
  .stat-pill .dot-conv{background:var(--conv);}
  .stat-pill .dot-dim{background:var(--text-dim);}
  .stat-value{font-weight:600;color:var(--text);}
  .stat-label{color:var(--text-dim);}
  .stats-bar-track{flex:1;min-width:160px;display:flex;border-radius:6px;overflow:hidden;height:8px;align-self:center;}
  .track-seg{height:100%;transition:width .4s;}

  /* TOOLBAR */
  .toolbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px;flex-wrap:wrap;}
  .toolbar-left{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  input[type=text].search,select.filter{padding:9px 12px;border:1px solid var(--line);border-radius:10px;font-size:13px;background:var(--surface);color:var(--text);font-family:'Inter',sans-serif;outline:none;}
  input[type=text].search{width:200px;}
  input[type=text].search::placeholder{color:var(--text-dim);}
  input[type=text].search:focus,select.filter:focus{border-color:var(--accent);}
  .status{font-size:12px;color:var(--text-dim);margin:0;min-height:16px;font-family:'JetBrains Mono',monospace;}

  /* SECTIONS & CARDS */
  .section{margin-bottom:30px;}
  .section-head{display:flex;align-items:center;gap:8px;padding:9px 16px;border-radius:10px;margin-bottom:14px;font-weight:700;font-size:13.5px;font-family:'Sora',sans-serif;letter-spacing:.02em;}
  .section-head.proceso{background:#332708;color:#F5C84C;}
  .section-head.idea{background:#1B2142;color:#A8B4F0;}
  .section-head.publicado{background:#3A2013;color:#FF9466;}
  .section-head .scount{font-weight:400;opacity:.7;font-size:12px;font-family:'JetBrains Mono',monospace;}
  .empty-row{padding:18px;text-align:center;color:var(--text-dim);font-size:13px;background:var(--surface);border:1px dashed var(--line);border-radius:12px;}
  .cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;}
  .item-card{background:var(--surface);border:1px solid var(--line);border-left:4px solid var(--horizon,var(--t1));border-radius:14px;padding:16px 18px;display:flex;flex-direction:column;gap:10px;touch-action:pan-y;}
  .item-top{display:flex;align-items:center;gap:8px;justify-content:space-between;}
  select.estado-select{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;padding:5px 10px;border-radius:100px;border:1px solid transparent;cursor:pointer;}
  select.estado-select.idea{background:#1B2142;color:#A8B4F0;border-color:#3A4380;}
  select.estado-select.proceso{background:#332708;color:#F5C84C;border-color:#6B4F14;}
  select.estado-select.publicado{background:#3A2013;color:#FF9466;border-color:#7A3A1E;}
  .fecha-input{width:76px;text-align:right;background:transparent;border:1px solid var(--line);border-radius:8px;color:var(--text-dim);font-family:'JetBrains Mono',monospace;font-size:11.5px;padding:5px 8px;outline:none;}
  .fecha-input:focus{border-color:var(--accent);color:var(--text);}
  textarea.gancho-input{width:100%;border:none;background:transparent;color:var(--text);font-family:'Sora',sans-serif;font-size:15.5px;font-weight:700;line-height:1.4;resize:none;padding:0;outline:none;min-height:24px;}
  .item-fase{font-size:11.5px;color:var(--text-dim);font-family:'JetBrains Mono',monospace;}

  /* BADGES */
  .badges-row{display:flex;gap:5px;flex-wrap:wrap;align-items:center;}
  .badge{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-family:'JetBrains Mono',monospace;font-weight:700;padding:3px 8px;border-radius:100px;letter-spacing:.02em;border:1px solid transparent;}
  .badge-adquisicion{background:var(--adq-soft);color:var(--adq);border-color:#312E81;}
  .badge-consideracion{background:var(--con-soft);color:var(--con);border-color:#0C4A6E;}
  .badge-conversion{background:var(--conv-soft);color:var(--conv);border-color:#14532D;}
  .badge-fria{background:#0F172A;color:#94A3B8;border-color:#1E293B;}
  .badge-tibia{background:#1C1917;color:#D4A96A;border-color:#292524;}
  .badge-caliente{background:#1C0A0A;color:#F97316;border-color:#3B1515;}
  .badge-organico{background:#1E1B4B;color:#A5B4FC;border-color:#312E81;}
  .badge-evergreen{background:#1A2E05;color:#84CC16;border-color:#1A3A05;}
  .badge-ambos{background:#1C1A2E;color:#C084FC;border-color:#2E1A4B;}
  .badge-tipo{background:var(--surface-2);color:var(--text-dim);border-color:var(--line);}

  /* CARD DETAILS */
  .item-details{border-top:1px solid var(--line);padding-top:8px;}
  .item-details summary{cursor:pointer;font-size:12px;color:var(--horizon,var(--accent));font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.03em;list-style:none;display:flex;align-items:center;justify-content:space-between;}
  .item-details summary::-webkit-details-marker{display:none;}
  .detail-grid{display:flex;flex-direction:column;gap:10px;margin-top:10px;}
  .detail-field label{display:block;font-size:10.5px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.04em;font-family:'JetBrains Mono',monospace;margin-bottom:4px;}
  .detail-field textarea,.detail-field input{width:100%;background:var(--surface-2);border:1px solid var(--line);border-radius:8px;color:var(--text);font-family:'Inter',sans-serif;font-size:13px;padding:8px 10px;resize:none;outline:none;line-height:1.5;}
  .detail-field textarea:focus,.detail-field input:focus{border-color:var(--accent);}
  .detail-field input.link-input{color:#7CB9E8;}
  .detail-meta-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .angulos-section{margin-top:10px;}
  .angulos-title{font-size:10.5px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.04em;font-family:'JetBrains Mono',monospace;margin-bottom:8px;padding-top:8px;border-top:1px solid var(--line);}
  .angulos-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .btn-guion{border:none;background:transparent;color:var(--accent);font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;cursor:pointer;padding:2px 0;letter-spacing:.03em;text-transform:uppercase;opacity:.8;}
  .btn-guion:hover{opacity:1;}
  .guion-result{background:var(--surface-2);border:1px solid var(--line);border-radius:10px;padding:12px;margin-top:8px;font-size:13px;line-height:1.7;white-space:pre-wrap;max-height:320px;overflow-y:auto;}

  /* BANCO */
  .banco-add{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:18px;margin-bottom:26px;display:flex;flex-direction:column;gap:12px;}
  .banco-add-row{display:flex;gap:10px;flex-wrap:wrap;}
  .banco-add textarea{flex:1 1 300px;min-height:64px;background:var(--surface-2);border:1px solid var(--line);border-radius:10px;color:var(--text);padding:10px 12px;font-family:'Inter',sans-serif;font-size:14px;resize:vertical;outline:none;}
  .banco-add textarea:focus{border-color:var(--accent);}
  .banco-add input[type=text]{flex:1 1 200px;background:var(--surface-2);border:1px solid var(--line);border-radius:10px;color:var(--text);padding:10px 12px;font-size:14px;outline:none;}
  .banco-add input[type=text]:focus{border-color:var(--accent);}
  .banco-add-actions{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
  .btn{font-family:'Inter',sans-serif;font-weight:700;font-size:13px;padding:10px 16px;border-radius:9px;cursor:pointer;border:none;transition:.15s;}
  .btn-ghost{background:var(--accent-soft);border:1px solid var(--accent);color:var(--accent);}
  .btn-ghost:hover{background:var(--accent);color:#0F0B16;}
  .btn-solid{background:var(--accent);color:#0F0B16;}
  .btn-solid:hover{filter:brightness(1.08);}
  .btn:disabled{opacity:.5;cursor:wait;}
  .suggest-result{display:flex;flex-direction:column;gap:10px;background:var(--surface-2);border-radius:10px;padding:12px 14px;}
  .suggest-result label{display:block;font-size:10.5px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.04em;font-family:'JetBrains Mono',monospace;margin-bottom:4px;}
  .suggest-result textarea{width:100%;background:var(--surface);border:1px solid var(--line);border-radius:8px;color:var(--text);font-family:'Inter',sans-serif;font-size:13.5px;padding:8px 10px;resize:vertical;outline:none;}
  .suggest-result textarea:focus{border-color:var(--accent);}
  .suggest-status{font-size:12px;color:var(--text-dim);min-height:16px;}
  .suggest-status.error{color:#F87171;}
  .banco-section-head{font-family:'Sora',sans-serif;font-weight:700;font-size:14px;margin-bottom:10px;color:var(--text);}
  .banco-section-head .count{font-weight:400;opacity:.7;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--text-dim);}
  .banco-list{display:flex;flex-direction:column;gap:10px;margin-bottom:28px;}
  .banco-item{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:14px 16px;display:flex;justify-content:space-between;align-items:flex-start;gap:12px;}
  .banco-item.aprobada{border-left:4px solid var(--accent);}
  .banco-item-text{flex:1;font-size:14px;line-height:1.5;white-space:pre-wrap;}
  .banco-item-gancho{font-family:'Sora',sans-serif;font-weight:700;font-size:15px;margin-bottom:4px;}
  .banco-item-caption{font-size:13px;color:var(--text-dim);white-space:pre-wrap;}
  .banco-item-link{font-size:12px;color:#7CB9E8;margin-top:6px;display:inline-block;word-break:break-all;}
  .banco-item-date{font-size:11px;color:var(--text-dim);margin-top:6px;font-family:'JetBrains Mono',monospace;}
  .banco-item-actions{display:flex;gap:6px;flex-shrink:0;}
  .icon-btn{border:1px solid var(--line);background:var(--surface-2);border-radius:8px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-dim);font-size:14px;}
  .icon-btn:hover{border-color:#EF4444;color:#EF4444;}
  .banco-empty{color:var(--text-dim);font-size:13px;padding:20px;text-align:center;border:1px dashed var(--line);border-radius:12px;}

  /* AGENTE TAB */
  .agente-wrap{display:flex;flex-direction:column;gap:16px;}
  .agente-header{font-family:'Sora',sans-serif;font-size:13px;font-weight:600;color:var(--text-dim);margin-bottom:4px;}
  .mode-selector{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:4px;}
  .mode-btn{padding:8px 14px;border-radius:100px;border:1px solid var(--line);background:var(--surface);color:var(--text-dim);font-size:12px;font-family:'JetBrains Mono',monospace;font-weight:700;cursor:pointer;letter-spacing:.02em;transition:.15s;}
  .mode-btn:hover{border-color:var(--accent);color:var(--accent);}
  .mode-btn.active{background:var(--accent-soft);border-color:var(--accent);color:var(--accent);}
  .mode-panel{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:20px;display:flex;flex-direction:column;gap:14px;}
  .mode-panel-title{font-family:'Sora',sans-serif;font-size:15px;font-weight:700;margin:0 0 4px;}
  .mode-panel-desc{font-size:13px;color:var(--text-dim);line-height:1.5;margin:0 0 6px;}
  .mode-field{display:flex;flex-direction:column;gap:4px;}
  .mode-field label{font-size:10.5px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.04em;font-family:'JetBrains Mono',monospace;}
  .mode-field input,.mode-field select,.mode-field textarea{background:var(--surface-2);border:1px solid var(--line);border-radius:10px;color:var(--text);font-family:'Inter',sans-serif;font-size:13px;padding:10px 12px;outline:none;resize:vertical;}
  .mode-field input:focus,.mode-field select:focus,.mode-field textarea:focus{border-color:var(--accent);}
  .mode-fields-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .mode-actions{display:flex;gap:10px;align-items:center;}
  .mode-output{background:var(--surface-2);border:1px solid var(--line);border-radius:12px;padding:16px;font-size:13.5px;line-height:1.8;white-space:pre-wrap;min-height:80px;color:var(--text);max-height:600px;overflow-y:auto;font-family:'Inter',sans-serif;}
  .mode-output-placeholder{color:var(--text-dim);font-style:italic;}
  .mode-status{font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--text-dim);}
  .mode-status.error{color:#F87171;}
  .mode-add-banco{border:none;background:transparent;color:var(--accent);font-size:12px;font-family:'JetBrains Mono',monospace;cursor:pointer;padding:0;font-weight:700;text-transform:uppercase;letter-spacing:.03em;}
  .mode-add-banco:hover{text-decoration:underline;}

  /* BANCO IDEAS TABLE v2 */
  .banco-v2{display:flex;flex-direction:column;gap:16px;}
  .banco-registrador{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:18px;}
  .banco-reg-label{font-family:'Sora',sans-serif;font-weight:700;font-size:14px;margin-bottom:10px;color:var(--text);}
  .banco-reg-row{display:flex;gap:10px;align-items:flex-start;}
  .banco-reg-row textarea{flex:1;min-height:64px;background:var(--surface-2);border:1px solid var(--line);border-radius:10px;color:var(--text);padding:10px 12px;font-family:'Inter',sans-serif;font-size:14px;resize:vertical;outline:none;}
  .banco-reg-row textarea:focus{border-color:var(--accent);}
  .banco-ideas-header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:10px;}
  .banco-ideas-title{font-family:'Sora',sans-serif;font-weight:700;font-size:14px;color:var(--text);}
  .banco-selection-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
  .btn-outline{font-family:'Inter',sans-serif;font-weight:600;font-size:12px;padding:7px 12px;border-radius:8px;cursor:pointer;border:1px solid var(--line);background:transparent;color:var(--text-dim);transition:.15s;}
  .btn-outline:hover{border-color:var(--accent);color:var(--accent);}
  .btn-outline.to-historias:hover{border-color:var(--adq);color:var(--adq);}
  .btn-outline.to-contenido:hover{border-color:var(--conv);color:var(--conv);}
  .ideas-table-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:12px;}
  .ideas-table{width:100%;border-collapse:collapse;font-size:12px;}
  .ideas-table th{background:var(--surface-2);color:var(--text-dim);font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:10px 12px;text-align:left;white-space:nowrap;border-bottom:1px solid var(--line);}
  .ideas-table th:first-child{width:36px;text-align:center;}
  .ideas-table td{padding:9px 12px;vertical-align:top;border-bottom:1px solid var(--line);color:var(--text);line-height:1.45;}
  .ideas-table tr:last-child td{border-bottom:none;}
  .ideas-table tr.ai-gen td:not(:first-child):not(:last-child){color:#4ADE80;}
  .ideas-table tr.ai-gen{background:rgba(34,197,94,.04);}
  .ideas-table tr:hover{background:var(--surface-2);}
  .ideas-table tr.ai-gen:hover{background:rgba(34,197,94,.08);}
  .ideas-table td.idea-cell{font-weight:600;font-family:'Sora',sans-serif;min-width:180px;max-width:220px;}
  .ideas-table td.angle-cell{min-width:160px;max-width:200px;font-size:11px;}
  .ideas-table td.uso-cell,.ideas-table td.pri-cell{white-space:nowrap;min-width:80px;}
  .pri-alta{color:#22C55E;font-weight:700;}
  .pri-media{color:#FACC15;font-weight:700;}
  .pri-baja{color:var(--text-dim);font-weight:700;}
  .ideas-empty-row td{padding:40px;text-align:center;color:var(--text-dim);font-size:13px;}
  .row-del{border:none;background:transparent;color:var(--text-dim);cursor:pointer;font-size:13px;padding:2px 4px;opacity:.4;transition:.15s;}
  .row-del:hover{color:#EF4444;opacity:1;}
  .hist-limit-notice{font-size:12px;color:var(--text-dim);padding:14px 0;text-align:center;font-family:'JetBrains Mono',monospace;border-top:1px solid var(--line);margin-top:6px;}
</style>
</head>
<body>
<div class="wrap">
  <a id="back-hub" href="/" style="display:inline-flex;align-items:center;gap:6px;font-family:'JetBrains Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:#B6A9C7;text-decoration:none;margin-bottom:12px;padding:7px 14px;border:1px solid #332A3D;border-radius:100px;transition:.15s;" onmouseover="this.style.borderColor='#B8F725';this.style.color='#B8F725'" onmouseout="this.style.borderColor='#332A3D';this.style.color='#B6A9C7'">← Hub de Jefes</a>
  <script>(function(){var p=location.pathname;var b=p.indexOf('/rancho-seco/')!==-1||p.endsWith('/rancho-seco')?'/rancho-seco':p.indexOf('/rim/')!==-1||p.endsWith('/rim')?'/rim':null;if(b)document.getElementById('back-hub').href=b;})();</script>
  <div id="brand-bar" style="display:inline-flex;align-items:center;gap:8px;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.13em;text-transform:uppercase;color:#B6A9C7;margin-bottom:14px;padding:5px 14px;border:1px solid #332A3D;border-radius:100px;background:rgba(255,255,255,.03);">
    <span style="color:#B8F725;">JefesHub</span><span style="opacity:.4;">·</span>
    <span>Jefe Contenido</span><span style="opacity:.4;">·</span>
    <span id="brand-marca-label">—</span>
  </div>
  <script src="/js/storage-client.js"></script>
  <script>(async function(){
    var BRANDS={'rancho-seco':{fallback:'Rancho Seco',color:'#F2C230'},'rim':{fallback:'RIM',color:'#F472B6'},'jefeshub':{fallback:'JefesHub',color:'#B8F725'}};
    var p=location.pathname;
    var key=/\/rancho-seco(\/|$)/.test(p)?'rancho-seco':/\/rim(\/|$)/.test(p)?'rim':'jefeshub';
    var b=BRANDS[key];var el=document.getElementById('brand-marca-label');
    el.textContent=b.fallback;el.style.color=b.color;
    try{var r=await window.storage.get(key+':brand-book.identidad');if(r&&r.value){var d=JSON.parse(r.value);if(d.nombre)el.textContent=d.nombre;}}catch(e){}
  })();</script>
  <h1>Jefe Contenido</h1>
  <p class="sub">Gestiona tus ideas, cambia estados y usa el agente IA para generar guiones, ideas evergreen, creativos y calendarios alineados a tu sistema de ventas.</p>

  <div class="tabs">

  const objetivos= ['alcance','educacion','confianza','venta'];
  const g = item.gancho||'';
  let tipo = tipos[semana-1]||'educativo';
  if(g.includes('mito')||g.includes('vs.')||g.includes('Antes y después')||g.includes('genérico')) tipo='comparacion';
  return {
    etapa: item.etapa || etapas[semana-1]||'adquisicion',

    audiencia: item.audiencia || audis[semana-1]||'fria',

}

// ─── DATE / HORIZON ─────────────────────────────────────────────────────────
function parseFechaDDMM(str){
  if(!str) return null;
  const m=str.trim().match(/^(\d{1,2})\/(\d{1,2})$/);
  if(!m) return null;
  const day=parseInt(m[1],10),month=parseInt(m[2],10)-1;
  if(month<0||month>11||day<1||day>31) return null;
  const now=new Date();
  let d=new Date(now.getFullYear(),month,day);
  if((now-d)/86400000>30) d=new Date(now.getFullYear()+1,month,day);
  return d;
}
function fechaHorizonIndex(fechaStr){
  const d=parseFechaDDMM(fechaStr);
  if(!d) return null;
  const today=new Date(); today.setHours(0,0,0,0);
  const days=Math.round((d-today)/86400000);
  if(days<=14) return 9;
  const span=120,t=Math.min(1,Math.max(0,(days-14)/(span-14)));
  return Math.max(0,Math.min(8,Math.round(8-t*8)));
}
const WEEK_HORIZON_INDEX={1:9,2:7,3:4,4:1};
function weekFromFase(fase){
  if(!fase) return null;
  const m=fase.match(/Semana\s*(\d+)/i);
  if(!m) return null;
  const w=parseInt(m[1],10);
  return (w>=1&&w<=4)?w:null;
}
function horizonIndex(item){
  const byFecha=fechaHorizonIndex(item.fecha);
  if(byFecha!==null) return byFecha;
  const week=weekFromFase(item.fase);
  if(week!==null) return WEEK_HORIZON_INDEX[week];
  return 0;
}
function horizonColorVar(item){ return 'var(--t'+(horizonIndex(item)+1)+')'; }

  const list=state[currentTab];

  list.forEach(item=>{

function render(){
  if(currentTab==='banco'){ renderBanco(); return; }
  if(currentTab==='agente'){ renderAgente(); return; }

  const list=state[currentTab];
  let rows=list.filter(r=>{
    const d=getDefaults(r);
    const et=r.etapa||d.etapa;
    const tp=r.tipo||d.tipo;
    if(filterFase && r.fase!==filterFase) return false;
    if(filterEtapa && et!==filterEtapa) return false;
    if(filterTipo && tp!==filterTipo) return false;
    if(searchTerm){
      const hay=(r.gancho+' '+r.descripcion+' '+r.dolor+' '+r.instrucciones+' '+r.recomendacion).toLowerCase();
      if(!hay.includes(searchTerm)) return false;
    }
    return true;
  });

  contentEl.innerHTML='';
  // Limit historias to 20 items
  const HIST_MAX=20;
  const totalRows=rows.length;
  if(currentTab==='historias') rows=rows.slice(0,HIST_MAX);

  SECTIONS.forEach(sec=>{
    const secRows=rows.filter(r=>r.estado===sec.key).sort((a,b)=>horizonIndex(b)-horizonIndex(a));
    const section=document.createElement('div');
    section.className='section';
    const head=document.createElement('div');
    head.className='section-head '+sec.cls;
    head.innerHTML=`${sec.emoji} ${sec.label} <span class="scount">${secRows.length}</span>`;
    section.appendChild(head);
    if(secRows.length===0){
      const empty=document.createElement('div');
      empty.className='empty-row';
      empty.textContent='Nada aquí todavía.';
      section.appendChild(empty);
    } else {
      const grid=document.createElement('div');
      grid.className='cards-grid';
      secRows.forEach(r=>{ grid.appendChild(buildCard(r)); });
      section.appendChild(grid);
    }
    contentEl.appendChild(section);
  });

  bindCardEvents();
  if(currentTab==='historias' && totalRows>HIST_MAX){
    const notice=document.createElement('p');
    notice.className='hist-limit-notice';
    notice.textContent=`Mostrando ${Math.min(HIST_MAX,rows.length)} de ${totalRows} historias · Usa los filtros para encontrar las demás`;

  }
}

function bindCardEvents(){
  contentEl.querySelectorAll('select.estado-select').forEach(sel=>sel.addEventListener('change',onFieldChange));
  contentEl.querySelectorAll('.fecha-input,.gancho-input,.detail-field input,.detail-field textarea,.detail-field select:not(.estado-select)').forEach(inp=>{
    inp.addEventListener('input',onFieldChange);
    if(inp.tagName==='TEXTAREA'){ autoGrow(inp); inp.addEventListener('input',()=>autoGrow(inp)); }
  });
  contentEl.querySelectorAll('.btn-guion').forEach(btn=>{
    btn.addEventListener('click',e=>{ e.preventDefault(); e.stopPropagation(); generateGuion(btn.dataset.id); });
  });
  contentEl.querySelectorAll('.item-card').forEach(card=>{
    attachSwipe(card,card.querySelector('.item-details'));
  });
}

function autoGrow(el){ el.style.height='auto'; el.style.height=el.scrollHeight+'px'; }

function onFieldChange(e){
  const id=e.target.dataset.id;
  const field=e.target.dataset.field;
  const list=state[currentTab];
  const row=list.find(r=>r.id===id);
  if(!row) return;
  if(field.startsWith('angulos.')){
    const key=field.split('.')[1];
    if(!row.angulos) row.angulos={};
    row.angulos[key]=e.target.value;
  } else {
    row[field]=e.target.value;
  }
  if(field==='estado'||field==='fecha'||field==='etapa'||field==='tipo'||field==='audiencia'){
    if(field==='estado'||field==='fecha') render();
    else{ buildCard_update(row); }
    renderStats();
  }
  scheduleSave();
}

function buildCard_update(row){
  // Re-render just the badges without full render
  const card=[...contentEl.querySelectorAll('.item-card')].find(c=>{
    const sel=c.querySelector('select.estado-select');
    return sel && sel.dataset.id===row.id;
  });
  if(!card) return;
  const badgesRow=card.querySelector('.badges-row');
  if(!badgesRow) return;
  const d=getDefaults(row);
  const etapa=row.etapa||d.etapa;
  const tipo=row.tipo||d.tipo;
  const audiencia=row.audiencia||d.audiencia;
  const em=ETAPA_META[etapa]||ETAPA_META.adquisicion;
  badgesRow.innerHTML=`
    <span class="badge badge-${etapa}">${em.label}</span>
    <span class="badge badge-tipo">${TIPO_LABELS[tipo]||tipo}</span>
    <span class="badge badge-${audiencia}">${AUDIENCIA_LABELS[audiencia]||audiencia}</span>`;
}

async function generateGuion(id){
  const list=state[currentTab];
  const row=list.find(r=>r.id===id);
  if(!row) return;
  const d=getDefaults(row);
  const etapa=row.etapa||d.etapa;
  const tipo=row.tipo||d.tipo;
  const audiencia=row.audiencia||d.audiencia;
  const uso=row.uso||d.uso;
  const el=document.getElementById('guion-'+id);
  if(!el) return;
  el.hidden=false;
  el.textContent='⏳ Generando guión...';

  const prompt=`${NEGOCIO_CONTEXT}

Actúa como Guionista de Contenido. Genera un guión para esta pieza:
GANCHO: ${row.gancho}
DESCRIPCIÓN: ${row.descripcion}
ETAPA: ${etapa} · AUDIENCIA: ${audiencia} · TIPO: ${tipo} · USO: ${uso}
DOLOR: ${row.dolor||'(ver descripción)'}

Entrega en formato:
HOOK (primeros 3-5 seg): …
GANCHO ESCRITO: …
PROBLEMA/SITUACIÓN: …
SOLUCIÓN/INSIGHT: …
CTA: …
DURACIÓN SUGERIDA: …
NOTAS DE GRABACIÓN: …`;

  try{
    const res=await fetch('/api/sugerir-contenido',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({idea:prompt})});
    const data=await res.json();
    if(!res.ok){ el.textContent='Error: '+(data.error||'No se pudo generar.'); return; }
    const texto=data.respuesta||data.guion||(data.gancho?(data.gancho+(data.caption?'\n\n'+data.caption:'')):'');
    el.textContent=texto||JSON.stringify(data,null,2);
  }catch(e){
    el.textContent='Error de conexión. Intenta de nuevo.';
  }
}

// ─── SWIPE (mobile) ──────────────────────────────────────────────────────────
function attachSwipe(card,detailsEl){
  if(!detailsEl) return;
  const THRESH=46;
  let sx=0,sy=0,ldx=0,dragging=false,horiz=false;
  card.addEventListener('touchstart',e=>{
    if(e.target.closest('input,textarea,select,button,a,summary')){ dragging=false; return; }
    const t=e.touches[0]; sx=t.clientX; sy=t.clientY; ldx=0; dragging=true; horiz=false;
  },{passive:true});
  card.addEventListener('touchmove',e=>{
    if(!dragging) return;
    const t=e.touches[0],dx=t.clientX-sx,dy=t.clientY-sy;
    if(!horiz){ if(Math.abs(dx)<8&&Math.abs(dy)<8) return; horiz=Math.abs(dx)>Math.abs(dy)*1.3; if(!horiz){dragging=false;return;} }
    if(dx>0){ e.preventDefault(); ldx=dx; card.style.transform=`translateX(${Math.min(dx*.35,40)}px)`; }
  },{passive:false});
  function end(){ if(!dragging) return; dragging=false; card.style.transition='transform .2s ease'; card.style.transform=''; setTimeout(()=>{card.style.transition='';},220); if(horiz&&ldx>THRESH) detailsEl.open=true; horiz=false; ldx=0; }
  card.addEventListener('touchend',end);
  card.addEventListener('touchcancel',end);
}

function parseIdeaJSON(text){
  if(!text) return null;
  let t=text.trim().replace(/```json\s*/g,'').replace(/```\s*/g,'');
  const arrM=t.match(/\[[\s\S]*\]/);
  if(arrM){ try{ return JSON.parse(arrM[0]); }catch(e){} }
  const objM=t.match(/\{[\s\S]*\}/);
  if(objM){ try{ return [JSON.parse(objM[0])]; }catch(e){} }
  return null;
}

  return {

}

function renderBancoTable(){
  const tbody=document.getElementById('ideas-tbody');
  if(!tbody) return;
  if(!state.bancoIdeas.length){
    tbody.innerHTML='<tr class="ideas-empty-row"><td colspan="10">Todavía no hay ideas. Escribe una arriba o usa <strong>Actualizar ideas</strong> para generar 10 nuevas.</td></tr>';
    return;
  }
  tbody.innerHTML=state.bancoIdeas.map(ideaRowHTML).join('');
  tbody.querySelectorAll('.idea-check').forEach(cb=>{
    cb.addEventListener('change',e=>{
      const bid=e.target.dataset.bid;
      const item=state.bancoIdeas.find(i=>i.id===bid);
      if(item) item.selected=e.target.checked;
      const selAll=document.getElementById('select-all-check');
      if(selAll) selAll.checked=state.bancoIdeas.length>0&&state.bancoIdeas.every(i=>i.selected);
    });
  });
  tbody.querySelectorAll('.row-del').forEach(btn=>{
    btn.addEventListener('click',e=>{
      const bid=e.currentTarget.dataset.bid;
      state.bancoIdeas=state.bancoIdeas.filter(i=>i.id!==bid);
      document.getElementById('count-banco').textContent=state.bancoIdeas.length;
      const cntEl=document.getElementById('banco-ideas-count');

let agenteMode='ideas';
let agenteOutput='';
let agenteStatus='';

function renderAgente(){
  controlsEl.style.display='none';
  statsBarEl.style.display='none';
  contentEl.innerHTML='';
  const wrap=document.createElement('div');
  wrap.className='agente-wrap';

  // Mode selector
  const modeSel=document.createElement('div');
  modeSel.innerHTML='<div class="agente-header">Selecciona el modo de trabajo:</div><div class="mode-selector"></div>';
  const modeSelDiv=modeSel.querySelector('.mode-selector');
  AGENTE_MODES.forEach(m=>{
    const btn=document.createElement('button');
    btn.className='mode-btn'+(m.key===agenteMode?' active':'');
    btn.textContent=m.label;
    btn.addEventListener('click',()=>{ agenteMode=m.key; agenteOutput=''; agenteStatus=''; renderAgente(); });
    modeSelDiv.appendChild(btn);
  });
  wrap.appendChild(modeSel);

  // Mode panel
  const mode=AGENTE_MODES.find(m=>m.key===agenteMode)||AGENTE_MODES[0];
  const panel=document.createElement('div');
  panel.className='mode-panel';

  let fieldsHtml='';
  const gridFields=mode.fields.filter(f=>f.type!=='textarea');
  const areaFields=mode.fields.filter(f=>f.type==='textarea');

  // Grid fields (2-col)
  if(gridFields.length){
    fieldsHtml+=`<div class="mode-fields-grid">`;
    gridFields.forEach(f=>{
      if(f.type==='select'){
        fieldsHtml+=`<div class="mode-field"><label>${f.label}</label><select id="${f.id}">${f.opts.map(o=>`<option value="${o}">${o.charAt(0).toUpperCase()+o.slice(1)}</option>`).join('')}</select></div>`;
      } else {
        fieldsHtml+=`<div class="mode-field"><label>${f.label}</label><input type="text" id="${f.id}" placeholder="${f.placeholder||''}"></div>`;
      }
    });
    fieldsHtml+=`</div>`;
  }
  // Textarea fields (full width)
  areaFields.forEach(f=>{
    fieldsHtml+=`<div class="mode-field"><label>${f.label}</label><textarea id="${f.id}" rows="4" placeholder="${f.placeholder||''}"></textarea></div>`;
  });

  panel.innerHTML=`
    <div>
      <div class="mode-panel-title">${mode.label}</div>
      <div class="mode-panel-desc">${mode.desc}</div>
    </div>
    ${fieldsHtml}
    <div class="mode-actions">
      <button class="btn btn-solid" id="agente-gen-btn">✨ Generar</button>
      <span class="mode-status" id="agente-status">${escHtml(agenteStatus)}</span>
    </div>
    <div>
      <div id="agente-output" class="mode-output">${agenteOutput?escHtml(agenteOutput):'<span class="mode-output-placeholder">El resultado aparecerá aquí...</span>'}</div>
      ${agenteOutput?`<div style="margin-top:8px;display:flex;gap:12px;align-items:center;">
        <button class="mode-add-banco" id="agente-add-banco">+ Guardar en Banco de ideas</button>
        <span style="font-size:11px;color:var(--text-dim);font-family:JetBrains Mono,monospace;">Ctrl+A para seleccionar todo el texto</span>
      </div>`:''}
    </div>`;
  wrap.appendChild(panel);
  contentEl.appendChild(wrap);

  // Generate button
  document.getElementById('agente-gen-btn').addEventListener('click',async()=>{
    const btn=document.getElementById('agente-gen-btn');
    const statusEl2=document.getElementById('agente-status');
    const outputEl=document.getElementById('agente-output');
    btn.disabled=true; btn.textContent='Generando...';
    statusEl2.className='mode-status'; statusEl2.textContent='⏳ Consultando al agente...';

    // Collect field values
    const fieldValues={};
    mode.fields.forEach(f=>{ const el=document.getElementById(f.id); if(el) fieldValues[f.id]=el.value; });

    const prompt=mode.buildPrompt(fieldValues);
    try{
      const res=await fetch('/api/sugerir-contenido',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({idea:prompt})});
      const data=await res.json();
      if(!res.ok){ statusEl2.textContent='Error: '+(data.error||'No se pudo generar.'); statusEl2.classList.add('error'); return; }
      agenteOutput=data.respuesta||data.guion||(data.gancho?(data.gancho+(data.caption?'\n\n'+data.caption:'')):'');
      if(!agenteOutput) agenteOutput=JSON.stringify(data,null,2);
      statusEl2.textContent='✅ Listo';
      outputEl.innerHTML=escHtml(agenteOutput);
      // add "save to bank" button
      const actDiv=document.createElement('div');
      actDiv.style.cssText='margin-top:8px;display:flex;gap:12px;align-items:center;';
      actDiv.innerHTML='<button class="mode-add-banco" id="agente-add-banco">+ Guardar en Banco de ideas</button><span style="font-size:11px;color:var(--text-dim);font-family:JetBrains Mono,monospace;">Ctrl+A para seleccionar todo</span>';
      outputEl.after(actDiv);
      actDiv.querySelector('#agente-add-banco').addEventListener('click',()=>{
        state.banco.unshift({id:'b'+Date.now().toString(36)+Math.random().toString(36).slice(2,8),texto:agenteOutput,gancho:'',caption:'',link:'',aprobada:false,fecha:new Date().toLocaleDateString('es-MX',{day:'2-digit',month:'short',year:'numeric'})});
        document.getElementById('count-banco').textContent=state.banco.length;
        scheduleSave();
        actDiv.innerHTML='<span style="color:var(--accent);font-size:12px;font-family:JetBrains Mono,monospace;">✅ Guardado en Banco de ideas</span>';
      });
    }catch(e){
      statusEl2.textContent='Error de conexión.'; statusEl2.classList.add('error');
    }finally{
      btn.disabled=false; btn.textContent='✨ Generar';
    }
  });
}

// ─── STORAGE ──────────────────────────────────────────────────────────────────
async function loadStorage(){
  try{
    const result=await window.storage.get(STORAGE_KEY);
    if(result&&result.value){
      const saved=JSON.parse(result.value);
      if(saved.historias) state.historias=saved.historias;
      if(saved.contenido) state.contenido=saved.contenido;
      if(saved.banco){ saved.banco.forEach(b=>{if(b.aprobada===undefined)b.aprobada=!!b.gancho;}); state.banco=saved.banco; }
      if(saved.bancoIdeas){ saved.bancoIdeas.forEach(b=>{if(b.selected===undefined)b.selected=false;}); state.bancoIdeas=saved.bancoIdeas; }
      const when=result.updatedAt?new Date(result.updatedAt).toLocaleString('es-MX',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}):'';
      statusEl.textContent=when?`Cargado — último guardado ${when}`:'Tu selección se cargó.';
    }
  }catch(e){
    statusEl.textContent='Nueva sesión (sin datos guardados aún).';
  }
  document.getElementById('count-banco').textContent=state.banco.length;
  buildFaseFilter();
  renderStats();
  render();
}

let saveTimer=null,pendingSave=false;
function scheduleSave(){ pendingSave=true; statusEl.textContent='Guardando...'; clearTimeout(saveTimer); saveTimer=setTimeout(()=>doSave(),500); }
async function doSave(opts){
  clearTimeout(saveTimer); saveTimer=null; if(!pendingSave) return;
  try{
    await window.storage.set(STORAGE_KEY,JSON.stringify({historias:state.historias,contenido:state.contenido,banco:state.banco,bancoIdeas:state.bancoIdeas}),opts);
    pendingSave=false; statusEl.textContent='Guardado.';
  }catch(e){
    statusEl.textContent=e.status===401?'Token incorrecto.':'No se pudo guardar.';
  }
}
document.addEventListener('visibilitychange',()=>{ if(document.visibilityState==='hidden'&&pendingSave) doSave({keepalive:true}); });
window.addEventListener('pagehide',()=>{ if(pendingSave) doSave({keepalive:true}); });

loadStorage();
</script>
